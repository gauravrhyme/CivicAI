<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicAI Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<style>
body {
  margin:0;
  font-family: Roboto, sans-serif;
  background:#121212;
  color:#FFFFFF;
}

/* HEADER (RESTORED BRANDING) */
.header {
  text-align:center;
  padding:10px;
  border-bottom:1px solid #2c2c2c;
}

.logo {
  width:80px;
  height:40px;
}

.subtitle {
  font-size:12px;
  color:#B0BEC5;
}

/* SECTION BASE */
.section {
  padding:10px;
}

/* MAP */
#map {
  height:200px;
  border-radius:8px;
}

/* LEADERBOARD */
.leaderboard-item {
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #2c2c2c;
}

/* TIMELINE */
.timeline {
  border-left:3px solid #007BFF;
  margin-left:10px;
  padding-left:10px;
}

.timeline-item {
  margin-bottom:10px;
  position:relative;
}

.timeline-item::before {
  content:'';
  width:8px;
  height:8px;
  background:#39FF14;
  border-radius:50%;
  position:absolute;
  left:-15px;
  top:5px;
}

/* SEVERITY */
.high { color:#FF0000; }
.medium { color:#FFA500; }
.low { color:#39FF14; }

.small {
  font-size:11px;
  color:#B0BEC5;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="https://via.placeholder.com/80x40?text=CivicAI" class="logo"/>
  <div class="subtitle">CivicAI Action Initiative</div>
</div>

<!-- MAP / HEATMAP -->
<div class="section">
  <h3>📍 Civic Heatmap</h3>
  <div id="map"></div>
</div>

<!-- LEADERBOARD -->
<div class="section">
  <h3>🏆 Ward Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<!-- TIMELINE -->
<div class="section">
  <h3>⚠ Issue Timeline</h3>
  <div id="timeline" class="timeline"></div>
</div>

<script>

const map = L.map('map').setView([12.9716,77.5946],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let heatLayer = null;

function loadData(){

fetch("/scrape")
.then(res => res.json())
.then(data => {

  const issues = data.issues || [];
  const leaderboard = data.leaderboard || [];

  /* HEATMAP */
  if(heatLayer){
    map.removeLayer(heatLayer);
  }

  const heatPoints = issues
    .filter(i => i.latitude && i.longitude)
    .map(i => [i.latitude, i.longitude, 0.5]);

  heatLayer = L.heatLayer(heatPoints, {radius:25});
  heatLayer.addTo(map);

  /* LEADERBOARD */
  const lb = document.getElementById("leaderboard");
  lb.innerHTML = "";

  leaderboard.forEach(w => {
    lb.innerHTML += `
      <div class="leaderboard-item">
        <span>${w.ward}</span>
        <span>${w.count}</span>
      </div>
    `;
  });

  /* TIMELINE */
  const timeline = document.getElementById("timeline");
  timeline.innerHTML = "";

  issues.slice(0,20).forEach(i => {
    timeline.innerHTML += `
      <div class="timeline-item">
        <div><b>${i.description}</b></div>
        <div class="${i.severity}">${i.severity}</div>
        <div class="small">${i.source}</div>
        <div class="small">${new Date(i.timestamp).toLocaleString()}</div>
      </div>
    `;
  });

})
.catch(err => console.error(err));

}

/* INITIAL LOAD */
loadData();

/* AUTO REFRESH */
setInterval(loadData, 30000);

</script>

</body>
</html>
