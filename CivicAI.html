<!DOCTYPE html>
<html>
<head>
  <title>CivicAI Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; margin:0; background:#121212; color:white; }
    #map { height: 50vh; }
    .section { padding:15px; }
    .card { background:#1e1e1e; padding:10px; margin:10px 0; border-radius:8px; }
    .high { color:red; }
    .medium { color:orange; }
    .low { color:lightgreen; }
  </style>
</head>

<body>

<h2 style="padding:15px;">🚀 CivicAI Dashboard</h2>

<div id="map"></div>

<div class="section">
  <h3>📊 Ward Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<div class="section">
  <h3>⚠ Issues</h3>
  <div id="issues"></div>
</div>

<div class="section">
  <h3>🧠 Clusters</h3>
  <div id="clusters"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([12.9716, 77.5946], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

fetch("/scrape")
.then(res => res.json())
.then(data => {

  // MAP
  data.issues.forEach(i => {
    if(i.latitude && i.longitude){
      L.circleMarker([i.latitude, i.longitude], {
        radius:5,
        color: i.severity === "high" ? "red" :
               i.severity === "medium" ? "orange" : "green"
      }).addTo(map)
        .bindPopup(`<b>${i.description}</b><br>${i.source}`);
    }
  });

  // ISSUES LIST
  const issuesDiv = document.getElementById("issues");
  data.issues.slice(0,20).forEach(i => {
    issuesDiv.innerHTML += `
      <div class="card">
        <b>${i.description}</b><br>
        Source: ${i.source}<br>
        Severity: <span class="${i.severity}">${i.severity}</span><br>
        Time: ${i.timestamp}
      </div>
    `;
  });

  // LEADERBOARD
  const lb = document.getElementById("leaderboard");
  data.leaderboard.forEach(w => {
    lb.innerHTML += `<div class="card">${w.ward} — ${w.count}</div>`;
  });

  // CLUSTERS
  const cl = document.getElementById("clusters");
  data.clusters.forEach(c => {
    cl.innerHTML += `<div class="card">${c.cluster} (${c.items.length})</div>`;
  });

});
</script>

</body>
</html>
